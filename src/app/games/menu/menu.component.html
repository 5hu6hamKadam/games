<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <h2>Games</h2>
    </div>
    <div class="col-2 text-center" *ngFor="let menuItem of menuItems">
      <div class="cursor-pointer" [routerLink]="['/', menuItem.path]">
        <img class="img" [src]="menuItem.src" [alt]="menuItem.title" />
        <p>{{ menuItem.title }}</p>
      </div>
    </div>
  </div>
</div>
